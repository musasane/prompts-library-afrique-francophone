name: Markdown Lint

# =============================================================================
# Valide la syntaxe et le style des fichiers Markdown du dépôt.
# Exécuté sur chaque push et chaque pull request ciblant main.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.json"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.json"
  workflow_dispatch:

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.41.0

      - name: Create default config if missing
        run: |
          if [ ! -f .markdownlint.json ]; then
            cat > .markdownlint.json <<'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD024": { "siblings_only": true },
            "MD036": false,
            "MD026": { "punctuation": ".,;:!" }
          }
          EOF
          fi

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore CHANGELOG.md

  link-check:
    name: Check Markdown links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/markdown-link-check-config.json"
          check-modified-files-only: "yes"
          base-branch: "main"
        continue-on-error: true
